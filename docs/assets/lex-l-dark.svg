<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" style="background: linear-gradient(135deg, #09090b 0%, #121217 50%, #0f0f14 100%); border-radius: 80px;">
  <defs>
    <linearGradient id="lex-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#b122e5"/>
    </linearGradient>
    <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
  </defs>
  <!-- Scale and center the original 32x32 icon in the 400x400 canvas -->
  <g transform="translate(40, 40) scale(10)" filter="url(#glow)">
      <!-- Letter L stylized -->
      <path d="M6 4h6v18h10v6H6V4z" fill="url(#lex-gradient)"/>
      <!-- Transformation arrow (output) -->
      <path d="M22 12l6 4-6 4v-3h-4v-2h4v-3z" fill="#00f2fe" opacity="0.9"/>
      <!-- Code brackets accent -->
      <path d="M24 22h2v2h-2v-2z M24 26h2v2h-2v-2z M26 24h2v2h-2v-2z" fill="#b122e5" opacity="0.8"/>
  </g>
</svg>
